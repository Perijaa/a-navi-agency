name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"

      - name: Ensure Jekyll is disabled
        run: touch ./out/.nojekyll

      - name: Verify hero assets in export
        run: |
          test -f ./out/videos/hero-cetina.mp4
          test -f ./out/images/hero-poster.jpg

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./out
          branch: gh-pages
          clean: true
          single-commit: true
